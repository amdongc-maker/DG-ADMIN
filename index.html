<head>

<meta charset="UTF-8">

<title>DG Deployment Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{
background:#f1f5f9;
}

header{
background:#1e3a8a;
color:#fff;
padding:16px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.card{
background:#fff;
border-radius:16px;
padding:16px;
margin-bottom:16px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.hidden{
display:none;
}

input,
select,
textarea{

width:100%;
padding:12px;
margin-top:8px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;

}

button{

width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;

}

.btn-primary{
background:#2563eb;
color:#fff;
}

.btn-success{
background:#16a34a;
color:#fff;
}

.btn-danger{
background:#dc2626;
color:#fff;
}

.btn-warning{
background:#ea580c;
color:#fff;
}

label{
font-weight:600;
display:block;
margin-top:8px;
}

.dashboard{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-bottom:15px;

}

.stat{

background:#fff;
border-radius:15px;
padding:15px;
text-align:center;
box-shadow:0 4px 12px rgba(0,0,0,.08);

}

.stat h2{
font-size:30px;
margin-bottom:8px;
color:#2563eb;
}

.stat span{
font-size:14px;
font-weight:bold;
}

.wellRow{

display:flex;
gap:8px;
margin-bottom:8px;

}

.wellRow input{

flex:1;

}

.statusCard{

background:white;
border-radius:16px;
padding:20px;
margin-bottom:18px;
font-size:14px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
border-left:6px solid #2563eb;

}

.pending{
background:#fff7ed;
border-left:6px solid orange;
}

.assigned{
background:#dcfce7;
border-left:6px solid green;
}

.running{
background:#dbeafe;
border-left:6px solid blue;
}

.completed{
background:#f3f4f6;
border-left:6px solid gray;
}

.rejected{
background:#fee2e2;
border-left:6px solid red;
}

#loginPage{

max-width:380px;
margin:60px auto;

}
/* ==========================
MOBILE HISTORY UI
========================== */

.historyCard{
    display:none;
}

@media(max-width:768px){

.dashboard{
    grid-template-columns:repeat(2,1fr);
}

.statusCard{
    padding:12px;
}

/* Mobile me Card Hide */
.mobileHistory{
    display:none !important;
}

/* Table */
.historyTable{
    display:table !important;
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
    margin-top:10px;
}

.historyTable th,
.historyTable td{
    width:33.33%;
    padding:8px 4px;
    border:1px solid #d6d6d6;
    text-align:center;
    font-size:12px;
    word-break:break-word;
}

.historyTable th{
    background:#1e3a8a;
    color:#fff;
}

}

@media(min-width:769px){

.mobileHistory{
    display:none;
}

.historyTable{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

.historyTable th,
.historyTable td{
    padding:10px;
    border:1px solid #d6d6d6;
    text-align:center;
}

.historyTable th{
    background:#1e3a8a;
    color:#fff;
}

}
/* ===========================
MODERN PROCESSING LOADER
===========================*/

#loadingOverlay{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(15,23,42,.72);
backdrop-filter:blur(5px);
display:none;
justify-content:center;
align-items:center;
z-index:999999;
}

.loaderBox{
width:300px;
background:#fff;
border-radius:22px;
padding:28px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.spinner{
width:70px;
height:70px;
margin:auto;
border:7px solid #dbeafe;
border-top:7px solid #2563eb;
border-radius:50%;
animation:spin .9s linear infinite;
}

.loaderTitle{
margin-top:18px;
font-size:20px;
font-weight:700;
color:#2563eb;
}

.loaderSub{
margin-top:8px;
font-size:14px;
color:#666;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}
</style>

const WEBAPP_URL="https://script.google.com/macros/s/AKfycbzkAbliBCybsBRvQbhF5ysIk0iBBK8F8F_ndWWRtVB3hWFNseoornI75PhpZpc_93RzdQ/exec";
 let CURRENT_USER = {
    name: "",
    mobile: ""
};

function formatDate(date){

if(!date || date=="NA") return "-";

let d=new Date(date);

if(isNaN(d)) return date;

return d.toLocaleString("en-IN",{
day:"2-digit",
month:"short",
year:"numeric",
hour:"2-digit",
minute:"2-digit",
hour12:false
});

}

/* ==========================
ADMIN LOGIN
========================== */

function login(){

let user = document.getElementById("username").value.trim();
let pass = document.getElementById("password").value.trim();

fetch(
    WEBAPP_URL +
    "?action=login" +
    "&username=" + encodeURIComponent(user) +
    "&password=" + encodeURIComponent(pass)
)

.then(r => r.json())

.then(res => {

    if(res.success){

    localStorage.setItem("dgAdminLogin","YES");
    localStorage.setItem("dgAdminName",res.name);
    localStorage.setItem("dgAdminMobile",res.mobile);

    CURRENT_USER.name = res.name;
CURRENT_USER.mobile = res.mobile;

           document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("mainPage").classList.remove("hidden");

        document.getElementById("adminName").innerHTML = res.name;

        loadMain();

    }else{

        document.getElementById("loginMsg").innerHTML =
        "Invalid Username or Password";

    }

})

.catch(function(){

    alert("Unable to connect.");

});

}

/* ==========================

========================== */

function submitRequest(){

let installation=document.getElementById("installation").value;
let manager=document.getElementById("manager").value;
let mobile=document.getElementById("managerMobile").value;
let managerEmail = document.getElementById("managerEmail").value;
let shutdownDate=document.getElementById("shutdownDate").value;
let shutdownType=document.getElementById("shutdownType").value;
let information=document.getElementById("information").value.trim();
let feeder=document.getElementById("feeder").value;
let contractor=document.getElementById("contractor").value;

/* Validation */

if(!installation){
alert("Select Installation");
return;
}

if(!shutdownDate){
alert("Select Shutdown Date");
return;
}

if(!shutdownType){
alert("Select Shutdown Type");
return;
}

if(!feeder){
alert("Select Feeder");
return;
}

if(!contractor){
alert("Select Contractor");
return;
}

/* Well Collection */

let wells=[];
let duplicate={};

let rows=document.querySelectorAll("#wellContainer .wellRow");

for(let r of rows){

let inputs=r.querySelectorAll("input");

let well=inputs[0].value.trim();
let cap=inputs[1].value.trim();

if(well=="" || cap=="") continue;

if(duplicate[well]){

alert("Duplicate Well : "+well);

return;

}

duplicate[well]=true;

wells.push({

well:well,

cap:Number(cap)

});

}

if(wells.length==0){

alert("Please Add Minimum One Well");

return;

}

/* Request Object */

let request={

installation:
document.getElementById("area").value +
" | " +
installation,

requestedBy:manager,

mobile:mobile,

email:managerEmail,

shutdownDate:shutdownDate,

shutdownType:shutdownType,

information:information,

feeder:feeder,

contractor:contractor,
adminName: CURRENT_USER.name,
adminMobile: CURRENT_USER.mobile,

wells:wells

};

/* Loader */

let btn=document.querySelector(".btn-success");

btn.disabled=true;

btn.innerHTML="Submitting...";
showLoading("Submitting DG Request...");

speak("Please wait. Your DG deployment request is being submitted.");

/* API */

fetch(

WEBAPP_URL+

"?action=submitRequest&data="+

encodeURIComponent(JSON.stringify(request))

)

.then(r=>r.json())

.then(res=>{

btn.disabled=false;

btn.innerHTML="SUBMIT DG REQUEST";

if(res.success){

hideLoading();

rocketExplosion();

speak("Congratulations. DG deployment request submitted successfully.");

showSuccess(
    "Request ID : <b>" + res.requestId + "</b>"
);

clearForm();

loadDashboard();

loadHistory();

}

else{

hideLoading();

speak("Submission failed.");

alert(res.message);

}

})

.catch(err=>{

hideLoading();

btn.disabled=false;

btn.innerHTML="SUBMIT DG REQUEST";

speak("Network error. Please try again.");

alert("Network Error");

});

}

function loadHistory() {

  fetch(WEBAPP_URL + "?action=history&t=" + Date.now())

    .then(r => r.json())

    .then(data => {

      let html = "";

      if (!data.length) {

        document.getElementById("requestList").innerHTML =
          "<center>No Request Found</center>";

        return;
      }

      data.reverse().forEach(function (req) {

        let cls = "pending";

        if (req.dgDeployStatus == "Operator Assigned")
          cls = "assigned";
        else if (req.dgDeployStatus == "DG Started")
          cls = "running";
        else if (req.dgDeployStatus == "Completed")
          cls = "completed";
        else if (req.dgDeployStatus == "DG CANCELLED")
          cls = "rejected";

       let rows = "";
let rowsTable = "";
let total = 0;

        (req.wells || []).forEach(function (w, i) {

          total += Number(w.cap) || 0;

       rows += `

<div class="historyCard">

<div class="historyRow">
<div class="historyLabel">SR. NO.</div>
<div class="historyValue">${i+1}</div>
</div>

<div class="historyRow">
<div class="historyLabel">Well</div>
<div class="historyValue">${w.well}</div>
</div>

<div class="historyRow">
<div class="historyLabel">Capacity</div>
<div class="historyValue">${w.cap} Ton</div>
</div>

<div class="historyRow">
<div class="historyLabel">DG Start</div>
<div class="historyValue">${formatDate(w.dgStartTime)}</div>
</div>

<div class="historyRow">
<div class="historyLabel">DG Stop</div>
<div class="historyValue">${formatDate(w.dgStopTime)}</div>
</div>

<div class="historyRow">
<div class="historyLabel">Total</div>
<div class="historyValue">${w.totalTime||"-"}</div>
</div>

<div class="historyRow">
<div class="historyLabel">Remark</div>
<div class="historyValue">${w.remark||"-"}</div>
</div>

<button
class="editBtn"
style="margin-top:10px;width:100%;"
onclick="editRequest('${req.requestId}','${w.well}')">
Edit
</button>

</div>

`;rowsTable += `
<tr>
    <td>${i+1}</td>
    <td>${w.well || "-"}</td>
    <td>${w.cap || "-"} Ton</td>
    </tr>
`;
        });

        html += `

<div class="statusCard ${cls}">

<b>Request ID :</b> ${req.requestId}<br><br>

<b>Installation :</b> ${req.installation}<br>

<b>Manager :</b> ${req.requestedBy}<br>

<b>Mobile :</b> ${req.mobile}<br>

<b>Shutdown Date :</b> ${formatDate(req.shutdownDate)}<br>

<b>Shutdown Type :</b> ${req.shutdownType}<br>

<b>Information :</b> ${req.information}<br>

<b>Feeder :</b> ${req.feeder}<br>

<b>Contractor :</b> ${req.contractor}<br><br>

<b>DG Requirement</b>

<div class="mobileHistory">

${rows}

</div>

<table class="historyTable"
style="
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:14px;
background:#fff;
border:1px solid #ccc;">

<thead>
<tr>
<th>SR. NO.</th>
<th>WELL NO.</th>
<th>CAPACITY</th>
</tr>
</thead>

<tbody>

${rowsTable}

</tbody>

</table>

<br>
${req.dgDeployStatus=="Pending" ? `

<button
class="btn-danger"
style="margin-top:10px;"
onclick="deleteRequest('${req.requestId}')">
🗑 Delete Complete Request
</button>

` : ``}

<br><br>
<b>Total Wells :</b> ${req.wells.length}<br>

<b>Total Capacity :</b> ${total} Ton<br>

<b>DG Status :</b> ${req.dgDeployStatus}
<br><br>

<br><br>

</div>
<div style="margin-top:15px;display:flex;gap:10px;flex-wrap:wrap;">

</div>
`;

      });

      document.getElementById("requestList").innerHTML = html;

    })

    .catch(function () {

      document.getElementById("requestList").innerHTML =
        "<center>Error Loading History</center>";

    });

}

function speak(text){

speechSynthesis.cancel();

let msg=new SpeechSynthesisUtterance(text);

msg.lang="en-IN";

msg.rate=1;

msg.pitch=1;

speechSynthesis.speak(msg);

}

function rocketExplosion(){

    // 🚀 Rocket Trail
    let rocket = confetti.shapeFromText({
        text: "🚀",
        scalar: 2
    });

    confetti({
        particleCount: 1,
        shapes:[rocket],
        startVelocity:70,
        gravity:0.35,
        ticks:140,
        origin:{x:0.5,y:1}
    });

    // 💥 Explosion
    setTimeout(function(){

        const duration = 1800;
        const end = Date.now() + duration;

        (function frame(){

            confetti({
                particleCount:18,
                angle:60,
                spread:90,
                origin:{x:0.5,y:0.30},
                startVelocity:55,
                colors:[
                    "#ff0000",
                    "#ff6600",
                    "#ffff00",
                    "#00ff00",
                    "#00ffff",
                    "#0066ff",
                    "#ff00ff",
                    "#ffffff"
                ]
            });

            confetti({
                particleCount:18,
                angle:120,
                spread:90,
                origin:{x:0.5,y:0.30},
                startVelocity:55,
                colors:[
                    "#ff0000",
                    "#ff6600",
                    "#ffff00",
                    "#00ff00",
                    "#00ffff",
                    "#0066ff",
                    "#ff00ff",
                    "#ffffff"
                ]
            });

            if(Date.now() < end){
                requestAnimationFrame(frame);
            }

        })();

    },700);

}
